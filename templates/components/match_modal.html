<div id="match-modal" class="card-animate">
  <div class="bg-white rounded-2xl shadow-2xl shadow-brand-200/50 overflow-hidden border border-brand-100 text-center p-8">
    <!-- Confetti-like gradient top bar -->
    <div class="h-2 bg-gradient-to-r from-brand-500 via-success-500 to-brand-500 -mt-8 -mx-8 mb-6"></div>

    <!-- Celebration emoji -->
    <div class="text-6xl mb-4 animate-bounce">🎉</div>

    <h2 class="font-display font-bold text-2xl text-brand-950 mb-2">It's a Match!</h2>
    <p class="text-gray-500 text-sm mb-6">You and {{ lister_profile.user.get_full_name }} are interested in connecting.</p>

    <!-- Two profiles side by side -->
    <div class="flex items-center justify-center gap-6 mb-8">
      <div class="text-center">
        <img src="{{ searcher_profile.profile_picture_url }}" alt="{{ searcher_profile.user.first_name }}" class="w-20 h-20 rounded-full object-cover ring-4 ring-brand-200 mx-auto mb-2">
        <p class="text-sm font-medium text-brand-950">{{ searcher_profile.user.first_name }}</p>
      </div>
      <div class="text-3xl text-brand-500">💜</div>
      <div class="text-center">
        <img src="{{ lister_profile.profile_picture_url }}" alt="{{ lister_profile.user.first_name }}" class="w-20 h-20 rounded-full object-cover ring-4 ring-success-500 mx-auto mb-2">
        <p class="text-sm font-medium text-brand-950">{{ lister_profile.user.first_name }}</p>
      </div>
    </div>

    <!-- WhatsApp button -->
    <a href="{{ whatsapp_url }}" target="_blank" rel="noopener noreferrer"
       class="whatsapp-btn inline-flex items-center gap-2 px-6 py-3.5 bg-green-500 hover:bg-green-600 text-white font-semibold rounded-xl transition-all duration-200 shadow-md shadow-green-500/25 mb-3 w-full justify-center">
      <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347z"/><path d="M12 0C5.373 0 0 5.373 0 12c0 2.625.846 5.059 2.284 7.034L.789 23.492a.75.75 0 00.917.918l4.458-1.495A11.945 11.945 0 0012 24c6.627 0 12-5.373 12-12S18.627 0 12 0zm0 22c-2.37 0-4.567-.804-6.307-2.156l-.44-.349-3.07 1.029 1.029-3.07-.349-.44A9.96 9.96 0 012 12C2 6.486 6.486 2 12 2s10 4.486 10 10-4.486 10-10 10z"/></svg>
      Connect on WhatsApp
    </a>

    <!-- Keep browsing link -->
    {% if is_lister %}
    <a href="{% url 'platform:interests' %}" class="inline-block text-sm text-gray-500 hover:text-brand-700 transition-colors mt-2">
      ← Keep Reviewing
    </a>
    {% else %}
    <a href="{% url 'platform:discovery' %}" class="inline-block text-sm text-gray-500 hover:text-brand-700 transition-colors mt-2">
      ← Keep Browsing
    </a>
    {% endif %}
  </div>
</div>
